<!doctype html>

<html>

<head>

<meta charset="utf-8">

<title>Knob Simulator</title>

<style>

body{

    background:#202020;
    color:white;
    font-family:Arial;
}

#screen{

    width:480px;
    height:480px;

    border:2px solid gray;

    margin:auto;

    padding:20px;
}

.selected{

    color:yellow;
    font-weight:bold;
}

</style>

</head>

<body>

<div id="screen">

Loading...

</div>

<script>

const ws = new WebSocket(
    "ws://" + location.host + "/ws"
);

ws.onmessage = (e)=>{

    const payload = JSON.parse(e.data);

    console.log(payload);

    document.getElementById("screen").innerHTML =
        `
        <h2>${payload.screen}</h2>
        Selected: ${payload.selected}
        `;
};

</script>

</body>

</html>
